<!DOCTYPE html>
<html>
<head>
<title>CLICKFI RUSH</title>

<style>
body {
  background:#020617;
  color:white;
  font-family:Arial;
  text-align:center;
}

h1 {
  color:#22c55e;
}

.card {
  background:#0f172a;
  padding:20px;
  margin:15px auto;
  width:350px;
  border-radius:15px;
}

button {
  padding:10px 20px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.over {background:#22c55e;}
.under {background:#ef4444;}

#timer {
  font-size:40px;
}

#price {
  font-size:50px;
}
</style>

</head>
<body>

<h1>CLICKFI RUSH</h1>
<p>Predict. Win. Repeat.</p>

<div class="card">
  <div id="timer">15</div>
  <div id="price">100</div>
  <p>Will it go UP or DOWN?</p>

  <button class="over" onclick="choose('up')">UP</button>
  <button class="under" onclick="choose('down')">DOWN</button>
</div>

<div class="card">
  <h3 id="result">Waiting...</h3>
</div>

<script>
let time = 15;
let price = 100;
let choice = null;

function tick() {
  time--;
  document.getElementById("timer").innerText = time;

  // fake market movement
  price += Math.floor(Math.random()*10 - 5);
  document.getElementById("price").innerText = price;

  if (time <= 0) endRound();
}

setInterval(tick,1000);

function choose(c) {
  choice = c;
}

function endRound() {
  let finalMove = Math.random() > 0.5 ? "up" : "down";

  if (choice === finalMove) {
    document.getElementById("result").innerText = "YOU WIN";
  } else {
    document.getElementById("result").innerText = "YOU LOSE";
  }

  // reset
  time = 15;
  choice = null;
}
</script>

</body>
</html>
