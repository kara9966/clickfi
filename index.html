<!DOCTYPE html>
<html>
<head>
  <title>CLICKFI</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      text-align: center;
      font-family: Arial;
    }
    h1 {
      font-size: 48px;
    }
    button {
      padding: 10px 20px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }
    #points {
      font-size: 40px;
      margin: 20px;
    }
  </style>
</head>
<body>

  <h1>CLICKFI</h1>
  <p>Click your way to crypto</p>

  <button onclick="connectWallet()">Connect Wallet</button>
  <p id="wallet"></p>

  <div id="points">0</div>
  <button onclick="addPoint()">CLICK</button>

  <script src="https://cdn.jsdelivr.net/npm/ethers/dist/ethers.min.js"></script>

  <script>
    let lastReset = localStorage.getItem("lastReset");
let today = new Date().toDateString();

if (lastReset !== today) {
  localStorage.setItem("points", 0);
  localStorage.setItem("lastReset", today);
}
    let points = localStorage.getItem("points") || 0;
document.getElementById("points").innerText = points;

function addPoint() {
  function addPoint() {
  if (points >= 100) return alert("Daily limit reached");
  points++;

  localStorage.setItem("points", points);
  document.getElementById("points").innerText = points;

  let float = document.createElement("div");
  float.innerText = "+1";
  float.style.position = "absolute";
  float.style.left = Math.random() * 80 + "%";
  float.style.top = "50%";
  float.style.color = "#22c55e";

  document.body.appendChild(float);

  setTimeout(() => {
    float.remove();
  }, 500);
}
}

async function connectWallet() {
  if (window.ethereum) {
    const provider = new ethers.providers.Web3Provider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    const signer = provider.getSigner();
    const address = await signer.getAddress();
    document.getElementById("wallet").innerText = address;
  } else {
    alert("Install MetaMask");
  }
}
